<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Inscription - AfriShop</title>
    <link rel="stylesheet" th:href="@{/css/style.css}"/>
</head>
<body>
    <div th:replace="~{fragments/layout :: header}"></div>

    <div class="auth-container">
        <div class="auth-card text-center">
            <h1>Creer un compte</h1>
            <p class="subtitle">Rejoignez la marketplace AfriShop</p>

            <div class="role-toggle" id="roleToggle">
                <button type="button" class="active" onclick="setRole('BUYER')">Acheteur</button>
                <button type="button" onclick="setRole('SELLER')">Vendeur</button>
            </div>

            <form method="post" action="#" style="text-align:left;">
                <input type="hidden" name="role" id="roleInput" value="BUYER"/>

                <div class="form-group">
                    <label>Nom complet</label>
                    <input type="text" name="name" placeholder="Votre nom" required/>
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" name="email" placeholder="votre@email.com" required/>
                </div>
                <div class="form-group">
                    <label>Mot de passe</label>
                    <input type="password" name="password" placeholder="••••••••" required minlength="8"/>
                </div>
                <div class="form-group">
                    <label>Confirmer le mot de passe</label>
                    <input type="password" name="confirmPassword" placeholder="••••••••" required/>
                </div>
                <label style="display:flex;align-items:flex-start;gap:.5rem;font-size:.85rem;color:#64748b;margin-bottom:1.5rem;cursor:pointer;">
                    <input type="checkbox" required style="margin-top:3px;"/>
                    <span>J'accepte les <a href="#" style="color:#4f46e5;">conditions d'utilisation</a> et la <a href="#" style="color:#4f46e5;">politique de confidentialite</a></span>
                </label>
                <button type="submit" class="btn btn-primary" style="width:100%;" id="submitBtn">Creer mon compte acheteur</button>
            </form>

            <div class="auth-link">
                Deja un compte ? <a href="/auth/login">Se connecter</a>
            </div>
        </div>
    </div>

    <div th:replace="~{fragments/layout :: footer}"></div>

    <script>
    function setRole(role) {
        document.getElementById('roleInput').value = role;
        var btns = document.querySelectorAll('#roleToggle button');
        btns[0].className = role === 'BUYER' ? 'active' : '';
        btns[1].className = role === 'SELLER' ? 'active' : '';
        document.getElementById('submitBtn').textContent = 'Creer mon compte ' + (role === 'SELLER' ? 'vendeur' : 'acheteur');
    }
    </script>
</body>
</html>
